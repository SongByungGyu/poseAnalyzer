<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .card { padding: 24px; }
  .row-b { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 14px; }
  .row-b:last-child { margin-bottom: 0; }
  .btn {
    font-family: var(--font-sans); font-weight: 600; font-size: 16px;
    border-radius: 14px;
    padding: 12px 22px;
    border: none; cursor: pointer; min-height: 48px;
    display: inline-flex; align-items: center; gap: 8px;
    letter-spacing: -0.005em;
    transition: transform 120ms var(--ease-out), background 120ms;
  }
  .btn:active { transform: scale(0.96); }
  .btn.primary   { background: #3B5BDB; color: #fff; }
  .btn.primary:hover { background: #2A47C3; }
  .btn.secondary { background: #E6EBFB; color: #2A47C3; }
  .btn.ghost     { background: transparent; color: #3B5BDB; }
  .btn.danger    { background: #E0683A; color: #fff; }
  .btn.disabled  { background: #ECEEF2; color: #A2ABBC; cursor: not-allowed; }
  .btn.lg { padding: 16px 28px; font-size: 17px; min-height: 56px; border-radius: 16px; }
  .btn.sm { padding: 8px 14px; font-size: 14px; min-height: 36px; border-radius: 10px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-bottom: 6px; }
</style>
</head>
<body>
<div class="card">
  <div class="label">PRIMARY · SIZES</div>
  <div class="row-b">
    <button class="btn primary lg">측정 시작</button>
    <button class="btn primary">사용하기</button>
    <button class="btn primary sm">저장</button>
  </div>
  <div class="label">VARIANTS</div>
  <div class="row-b">
    <button class="btn secondary">다시 찍기</button>
    <button class="btn ghost">취소</button>
    <button class="btn danger">삭제</button>
    <button class="btn disabled">분석 중…</button>
  </div>
</div>
</body></html>
