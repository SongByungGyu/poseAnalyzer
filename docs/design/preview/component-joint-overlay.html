<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Joint overlay sample</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .card { padding: 20px 24px; }
  .stage {
    background: var(--bg-surface);
    border: 1px solid var(--border-1);
    border-radius: 18px;
    padding: 16px;
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .photo {
    aspect-ratio: 3/4;
    border-radius: 12px;
    background:
      radial-gradient(ellipse at 50% 30%, #4F5868 0 18%, transparent 21%),
      linear-gradient(180deg, #707A8E 0%, #4F5868 100%);
    position: relative; overflow: hidden;
  }
  /* body silhouette */
  .photo::before {
    content: ""; position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 14% 10% at 50% 18%, #353D4B 60%, transparent 62%),
      radial-gradient(ellipse 22% 16% at 50% 34%, #353D4B 60%, transparent 62%),
      radial-gradient(ellipse 16% 30% at 50% 58%, #353D4B 60%, transparent 62%),
      radial-gradient(ellipse 18% 16% at 38% 85%, #353D4B 60%, transparent 62%),
      radial-gradient(ellipse 18% 16% at 62% 85%, #353D4B 60%, transparent 62%);
    filter: blur(2px);
  }
  .photo svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.04em; }
  .caption { font-size: 11px; color: var(--fg-3); margin-top: 8px; text-align: center; font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="card">
  <div class="stage">
    <div>
      <div class="label">FRONT · 정면</div>
      <div class="photo">
        <svg viewBox="0 0 100 133" preserveAspectRatio="none">
          <!-- skeleton lines (mint) -->
          <g stroke="#56BAB0" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.92">
            <line x1="50" y1="18" x2="50" y2="32"/>
            <line x1="38" y1="40" x2="62" y2="40"/>
            <line x1="38" y1="40" x2="38" y2="70"/>
            <line x1="62" y1="40" x2="62" y2="70"/>
            <line x1="42" y1="72" x2="58" y2="72"/>
            <line x1="42" y1="72" x2="40" y2="110"/>
            <line x1="58" y1="72" x2="60" y2="110"/>
          </g>
          <!-- joints (indigo) -->
          <g fill="#3B5BDB" stroke="#FFFFFF" stroke-width="0.6">
            <circle cx="50" cy="18" r="2.2"/>
            <circle cx="38" cy="40" r="1.8"/>
            <circle cx="62" cy="40" r="1.8"/>
            <circle cx="38" cy="70" r="1.6"/>
            <circle cx="62" cy="70" r="1.6"/>
            <circle cx="42" cy="72" r="1.6"/>
            <circle cx="58" cy="72" r="1.6"/>
            <circle cx="40" cy="110" r="1.6"/>
            <circle cx="60" cy="110" r="1.6"/>
          </g>
        </svg>
      </div>
      <div class="caption">9 joints · conf avg 0.88</div>
    </div>
    <div>
      <div class="label">SIDE · 측면</div>
      <div class="photo">
        <svg viewBox="0 0 100 133" preserveAspectRatio="none">
          <g stroke="#56BAB0" stroke-width="0.9" stroke-linecap="round" fill="none" opacity="0.92">
            <line x1="58" y1="18" x2="52" y2="34"/>
            <line x1="52" y1="34" x2="48" y2="74"/>
            <line x1="48" y1="74" x2="50" y2="108"/>
            <!-- angle arc -->
            <path d="M 56 22 A 8 8 0 0 1 53 30" stroke="#E0683A" stroke-width="0.8" opacity="0.9" stroke-dasharray="1.5 1.5"/>
          </g>
          <g fill="#3B5BDB" stroke="#FFFFFF" stroke-width="0.6">
            <circle cx="58" cy="18" r="2.2"/>
            <circle cx="52" cy="34" r="1.8"/>
            <circle cx="48" cy="74" r="1.8"/>
            <circle cx="50" cy="108" r="1.6"/>
          </g>
          <!-- angle label -->
          <g font-family="ui-monospace" font-size="4" fill="#0F1B2D">
            <rect x="60" y="20" width="14" height="6" rx="2" fill="#FFFFFF" opacity="0.95"/>
            <text x="62" y="24.5" fill="#E0683A" font-weight="700">158°</text>
          </g>
        </svg>
      </div>
      <div class="caption">측면 · forwardHead 158° (suspect)</div>
    </div>
  </div>
</div>
</body></html>
