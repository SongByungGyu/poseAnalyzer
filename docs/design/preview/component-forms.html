<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Form controls</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .card { padding: 20px 24px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 12px; font-weight: 600; color: var(--fg-2);
    letter-spacing: -0.005em;
  }
  .input {
    height: 48px; padding: 0 14px; border-radius: 14px;
    background: var(--bg-surface);
    border: 1px solid var(--border-1);
    font-family: var(--font-sans); font-size: 16px;
    color: var(--fg-1);
    display: flex; align-items: center; gap: 8px;
    font-variant-numeric: tabular-nums;
  }
  .input.focus { border-color: #3B5BDB; border-width: 1.5px; padding: 0 13.5px; }
  .input.err   { border-color: #E0683A; }
  .input .suffix { color: var(--fg-3); font-size: 14px; margin-left: auto; }

  .seg {
    display: inline-flex; background: var(--gray-100); border-radius: 10px; padding: 3px;
  }
  .seg button {
    border: 0; background: transparent; padding: 7px 14px; border-radius: 8px;
    font-family: var(--font-sans); font-weight: 600; font-size: 13px; color: var(--fg-2);
    cursor: pointer;
  }
  .seg button.on { background: var(--bg-surface); color: var(--fg-1); box-shadow: 0 1px 2px rgba(15,27,45,0.08); }

  .hint { font-size: 12px; color: var(--fg-3); }
  .err-hint { font-size: 12px; color: #E0683A; }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="field">
      <label>키 (cm)</label>
      <div class="input focus">
        <span>172.5</span>
        <span class="suffix">cm</span>
      </div>
      <span class="hint">50–250 사이로 입력</span>
    </div>
    <div class="field">
      <label>키 (cm) — 오류</label>
      <div class="input err">
        <span>320</span>
        <span class="suffix">cm</span>
      </div>
      <span class="err-hint">범위를 벗어났습니다</span>
    </div>
    <div class="field" style="grid-column: span 2;">
      <label>기간</label>
      <div class="seg">
        <button>7일</button>
        <button class="on">30일</button>
        <button>전체</button>
      </div>
    </div>
  </div>
</div>
</body></html>
