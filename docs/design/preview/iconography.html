<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Iconography</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .card { padding: 20px 24px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px 4px; }
  .ic {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 8px 4px; border-radius: 10px;
  }
  .ic svg { width: 24px; height: 24px; color: #0F1B2D; }
  .ic .n { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); text-align: center; }
</style>
</head>
<body>
<div class="card">
  <div class="label">LUCIDE STAND-IN FOR SF SYMBOLS · 24/2px STROKE</div>
  <div class="grid">
    <div class="ic"><svg><use href="../assets/icons.svg#i-camera"/></svg><div class="n">camera</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-bar-chart"/></svg><div class="n">chart</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-settings"/></svg><div class="n">settings</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-circle-dot"/></svg><div class="n">shutter</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-rotate-ccw"/></svg><div class="n">retake</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-check-circle"/></svg><div class="n">confirm</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-image"/></svg><div class="n">library</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-ruler"/></svg><div class="n">height</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-trending-up"/></svg><div class="n">up</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-trending-down"/></svg><div class="n">down</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-arrow-right"/></svg><div class="n">flat</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-chevron-left"/></svg><div class="n">back</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-chevron-right"/></svg><div class="n">forward</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-calendar"/></svg><div class="n">date</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-clock"/></svg><div class="n">time</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-user"/></svg><div class="n">profile</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-info"/></svg><div class="n">info</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-alert"/></svg><div class="n">alert</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-plus"/></svg><div class="n">add</div></div>
    <div class="ic"><svg><use href="../assets/icons.svg#i-x"/></svg><div class="n">close</div></div>
  </div>
</div>
</body></html>
