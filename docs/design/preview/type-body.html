<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Type scale — body</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .card { padding: 20px 24px; }
  .row-spec { display: flex; align-items: baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--border-2); }
  .row-spec:last-child { border-bottom: none; }
  .row-spec .tok { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 96px; flex: none; }
  .row-spec .specimen { flex: 1; }
  .row-spec .meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); white-space: nowrap; }
</style>
</head>
<body>
<div class="card">
  <div class="row-spec">
    <div class="tok">.t-title</div>
    <div class="specimen t-title">측면 사진을 선택해주세요</div>
    <div class="meta">17/24 · 600</div>
  </div>
  <div class="row-spec">
    <div class="tok">.t-body</div>
    <div class="specimen t-body">관절 인식이 완료되면 8가지 자세를 자동으로 분석합니다.</div>
    <div class="meta">16/24 · 400</div>
  </div>
  <div class="row-spec">
    <div class="tok">.t-callout</div>
    <div class="specimen t-callout">사람을 인식할 수 없습니다. 다시 측정해주세요.</div>
    <div class="meta">15/22 · 500</div>
  </div>
  <div class="row-spec">
    <div class="tok">.t-caption</div>
    <div class="specimen t-caption">2026.05.13 · 오후 7:24</div>
    <div class="meta">13/18 · 500</div>
  </div>
  <div class="row-spec">
    <div class="tok">.t-micro</div>
    <div class="specimen t-micro">STEP 2 / 3 · 측면 사진</div>
    <div class="meta">11/15 · 600</div>
  </div>
</div>
</body></html>
