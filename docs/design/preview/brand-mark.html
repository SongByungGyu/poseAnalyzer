<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>Brand mark</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .card { padding: 24px; display: flex; gap: 24px; align-items: center; }
  .mark {
    width: 96px; height: 96px;
    flex: none;
  }
  .word {
    display: flex; flex-direction: column; gap: 4px;
  }
  .word .top { font-size: 36px; font-weight: 800; letter-spacing: -0.024em; color: #0F1B2D; line-height: 1; }
  .word .top em { font-style: normal; font-weight: 500; color: #4F5868; }
  .word .tag { font-size: 14px; color: var(--fg-3); font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <img class="mark" src="../assets/app-icon.svg" alt="PoseAnalyzer mark">
  <div class="word">
    <div class="top">Pose<em>Analyzer</em></div>
    <div class="tag">자세를 본다, 변화를 본다.</div>
  </div>
</div>
</body></html>
